<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mainframe // Central Node</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --matrix-green: #00ff41;
      --dark-green: #002200;
      --terminal-bg: rgba(0, 8, 0, 0.9);
      --panel-border: 1px solid #00ff41;
      --glow-effect: 0 0 12px rgba(0, 255, 65, 0.4);
      --text-bright: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #000000;
      color: var(--matrix-green);
      font-family: "Share Tech Mono", monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 15px;
      overflow: hidden;
    }

    /* Live Canvas Backdrop Stream */
    #matrix-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
    }

    /* Main Processor Grid Deck */
    .mainframe-wrapper {
      width: 100%;
      max-width: 600px;
      background: var(--terminal-bg);
      border: 2px solid var(--matrix-green);
      box-shadow: var(--glow-effect), inset 0 0 20px rgba(0, 255, 65, 0.15);
      padding: 35px;
      border-radius: 4px;
      position: relative;
    }

    .mainframe-wrapper::before {
      content: "SYSTEM_DECK // NODE_ID: " attr(data-node-id);
      position: absolute;
      top: 6px;
      left: 12px;
      font-size: 0.75rem;
      letter-spacing: 1px;
      opacity: 0.7;
    }

    /* System Chronometer Block */
    .clock-display {
      font-size: 5.2rem;
      font-weight: normal;
      letter-spacing: 1px;
      color: var(--text-bright);
      text-shadow: 0 0 10px var(--matrix-green), 0 0 15px rgba(0, 255, 65, 0.5);
      line-height: 1;
      margin-bottom: 4px;
    }

    .date-display {
      font-size: 1.05rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(0, 255, 65, 0.75);
      margin-bottom: 35px;
    }

    /* Command Target Input Form Routing */
    .search-box {
      display: flex;
      align-items: center;
      background: rgba(0, 15, 0, 0.8);
      border: var(--panel-border);
      border-radius: 2px;
      padding: 4px 4px 4px 14px;
      width: 100%;
      margin-bottom: 40px;
      box-shadow: inset 0 0 6px rgba(0, 255, 65, 0.2);
    }

    .search-box i {
      color: var(--matrix-green);
      font-size: 14px;
      margin-right: 12px;
      text-shadow: var(--glow-effect);
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-bright);
      font-size: 1rem;
      font-family: "Share Tech Mono", monospace;
    }

    .search-box input::placeholder {
      color: rgba(0, 255, 65, 0.4);
    }

    /* Parameter Selector Module */
    .search-box select {
      background: #000000;
      border: var(--panel-border);
      color: var(--matrix-green);
      padding: 8px 12px;
      font-size: 0.8rem;
      font-family: "Share Tech Mono", monospace;
      font-weight: bold;
      cursor: pointer;
      outline: none;
      text-transform: uppercase;
    }

    .search-box select:hover {
      background: var(--matrix-green);
      color: #000000;
    }

    /* Intercept Channel Gateway Arrays Grid */
    .shortcuts {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      width: 100%;
      margin-bottom: 10px;
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      cursor: pointer;
      color: var(--matrix-green);
    }

    .shortcut-icon {
      width: 58px;
      height: 58px;
      background: rgba(0, 10, 0, 0.9);
      border: var(--panel-border);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .shortcut:hover .shortcut-icon {
      transform: translateY(-3px);
      background: var(--matrix-green);
      box-shadow: var(--glow-effect);
    }

    .shortcut-icon img {
      width: 24px;
      height: 24px;
      filter: invert(100%) sepia(100%) saturate(0%) hue-rotate(288deg) brightness(102%) contrast(102%);
      transition: filter 0.2s ease;
    }

    .shortcut:hover .shortcut-icon img {
      filter: invert(0%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(0%) contrast(100%);
    }

    .shortcut-icon i {
      font-size: 20px;
      color: var(--matrix-green);
      transition: color 0.2s ease;
    }

    .shortcut:hover .shortcut-icon i {
      color: #000000;
    }

    .shortcut-label {
      font-size: 0.75rem;
      color: var(--matrix-green);
      text-align: center;
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.8;
    }

    .shortcut:hover .shortcut-label {
      opacity: 1;
      color: var(--text-bright);
      text-shadow: 0 0 4px var(--matrix-green);
    }

    /* System Diagnostics Readout Footer */
    .quote-console {
      margin-top: 30px;
      font-size: 0.85rem;
      color: rgba(0, 255, 65, 0.65);
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 15px;
      border-radius: 2px;
      border-left: 3px solid var(--matrix-green);
      text-align: left;
    }

    .quote-console::before {
      content: "SYS_MSG_LOG_STUB // ";
      font-weight: bold;
      color: var(--matrix-green);
    }

    /* Central Mainframe Overlay Handshake Processing Screen */
    .loader {
      position: fixed;
      inset: 0;
      background: #000000;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .loader.show {
      display: flex;
    }

    .terminal-handshake-box {
      text-align: center;
    }

    .terminal-handshake-box p {
      font-size: 1.1rem;
      letter-spacing: 2px;
      margin-bottom: 15px;
      text-transform: uppercase;
      text-shadow: var(--glow-effect);
    }

    .pulse-line {
      width: 180px;
      height: 2px;
      background: var(--matrix-green);
      margin: 0 auto;
      animation: trackingPulse 1s linear infinite alternate;
      box-shadow: var(--glow-effect);
    }

    @keyframes trackingPulse {
      from { width: 20px; opacity: 0.2; }
      to { width: 180px; opacity: 1; }
    }

    @media (max-width: 540px) {
      .shortcuts {
        grid-template-columns: repeat(4, 1fr);
      }
      .clock-display { font-size: 3.8rem; }
    }
  </style>
</head>

<body>
  <canvas id="matrix-bg"></canvas>

  <div class="loader" id="loader">
    <div class="terminal-handshake-box">
      <p>Redirecting_Signal_Packets...</p>
      <div class="pulse-line"></div>
    </div>
  </div>

  <div class="mainframe-wrapper" id="nodeDeck">
    <div class="clock-display" id="clock">00:00</div>
    <div class="date-display" id="date">SYNCING_METRICS...</div>

    <form class="search-box" id="searchForm">
      <i class="fa-solid fa-terminal"></i>
      <input type="text" id="searchInput" placeholder="input_payload_query..." autocomplete="off">
      <select id="engine">
        <option value="https://search.brave.com/search?q=">Brave</option>
        <option value="https://duckduckgo.com/?q=">DuckDuck</option>
        <option value="https://www.google.com/search?q=">Google</option>
      </select>
    </form>

    <div class="shortcuts" id="shortcuts">
      <a class="shortcut" data-url="https://youtube.com">
        <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg" alt="YouTube"></div>
        <span class="shortcut-label">YouTube</span>
      </a>
      <a class="shortcut" data-url="https://github.com">
        <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg" alt="GitHub"></div>
        <span class="shortcut-label">GitHub</span>
      </a>
      <a class="shortcut" data-url="https://discord.com">
        <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg" alt="Discord"></div>
        <span class="shortcut-label">Discord</span>
      </a>
      <a class="shortcut" data-url="https://twitter.com">
        <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg" alt="Twitter"></div>
        <span class="shortcut-label">Twitter</span>
      </a>
      <a class="shortcut" data-url="https://reddit.com">
        <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/reddit.svg" alt="Reddit"></div>
        <span class="shortcut-label">Reddit</span>
      </a>
      <a class="shortcut" data-url="https://spotify.com">
        <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/spotify.svg" alt="Spotify"></div>
        <span class="shortcut-label">Spotify</span>
      </a>
      <a class="shortcut" data-url="https://netflix.com">
        <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/netflix.svg" alt="Netflix"></div>
        <span class="shortcut-label">Netflix</span>
      </a>
      <a class="shortcut" data-url="https://twitch.tv">
        <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/twitch.svg" alt="Twitch"></div>
        <span class="shortcut-label">Twitch</span>
      </a>
      <a class="shortcut" data-url="https://mail.google.com">
        <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/gmail.svg" alt="Gmail"></div>
        <span class="shortcut-label">Gmail</span>
      </a>
      <div class="shortcut" id="addShortcut">
        <div class="shortcut-icon"><i class="fa-solid fa-plus-sharp"></i></div>
        <span class="shortcut-label">LINK_NODE</span>
      </div>
    </div>

    <div class="quote-console" id="quote">Establishing buffer connection hooks...</div>
  </div>

  <script>
    const canvas = document.getElementById('matrix-bg');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const matrixChars = "ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓ1234567890ABCDEF:*+-<>".split("");
    const fontSize = 14;
    let columns = canvas.width / fontSize;
    let dropPositions = Array(Math.floor(columns)).fill(1);

    function drawMatrixRain() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#00ff41';
      ctx.font = fontSize + 'px "Share Tech Mono", monospace';

      for (let i = 0; i < dropPositions.length; i++) {
        const char = matrixChars[Math.floor(Math.random() * matrixChars.length)];
        const x = i * fontSize;
        const y = dropPositions[i] * fontSize;

        if (Math.random() > 0.98) {
          ctx.fillStyle = '#ffffff';
        } else {
          ctx.fillStyle = '#00ff41';
        }

        ctx.fillText(char, x, y);

        if (y > canvas.height && Math.random() > 0.975) {
          dropPositions[i] = 0;
        }
        dropPositions[i]++;
      }
    }
    setInterval(drawMatrixRain, 33);
    
    // Inject a unique system stamp node variant identifier string
    document.getElementById('nodeDeck').setAttribute('data-node-id', Math.floor(Math.random() * 900000 + 100000));
  </script>

  <script>
    const $ = s => document.querySelector(s);
    const nav = url => {
      $('#loader').classList.add('show');
      window.parent?.postMessage({ type: 'navigate', url }, '*');
    };

    // Integrated Chronometer Subroutines
    function updateClock() {
      const now = new Date();
      $('#clock').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
      
      const parts = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
      $('#date').textContent = parts.replace(/,/g, ' //') + ` // YEAR_${now.getFullYear()}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Form Redirection System 
    $('#searchForm').onsubmit = e => {
      e.preventDefault();
      const q = $('#searchInput').value.trim();
      if (q) nav($('#engine').value + encodeURIComponent(q));
    };

    // P2P Interactive Node Tracking
    $('#shortcuts').onclick = e => {
      const shortcut = e.target.closest('.shortcut[data-url]');
      const addBtn = e.target.closest('#addShortcut');

      if (shortcut) {
        e.preventDefault();
        nav(shortcut.dataset.url);
      } else if (addBtn) {
        const name = prompt("ENTER IDENTIFIER LABEL FOR NEW SEGMENT LINK:");
        if (!name) return;
        let url = prompt("SPECIFY IP PATHWAY / DESTINATION TARGET URL:");
        if (!url) return;
        if (!url.startsWith('http')) url = 'https://' + url;

        const shortcuts = JSON.parse(localStorage.getItem('shortcuts') || '[]');
        shortcuts.push({ name, url });
        localStorage.setItem('shortcuts', JSON.stringify(shortcuts));
        renderCustom();
      }
    };

    function renderCustom() {
      document.querySelectorAll('.custom-shortcut').forEach(e => e.remove());
      const shortcuts = JSON.parse(localStorage.getItem('shortcuts') || '[]');
      const addBtn = $('#addShortcut');

      shortcuts.forEach(s => {
        const div = document.createElement('div');
        div.className = 'shortcut custom-shortcut';
        div.dataset.url = s.url;
        div.innerHTML = `
          <div class="shortcut-icon"><i class="fa-solid fa-network-wired"></i></div>
          <span class="shortcut-label">${s.name}</span>
        `;
        addBtn.before(div);
      });
    }

    // Diagnostics Intercept String Storage
    const quotes = [
      "Bubber is the goat",
    "zip it, lock it, put it in your pocket",
    "try Magical Mini, it's lemon fresh!",
    "the solution to your problems",
    "New Look, Same great taste!",
    "Honey, where are my pants?",
    "it's glummy",
    "liar liar pants on fire",
    "im boopy box!",
    "poodlepoop butt-biscuits",
    "jablicky asparagus timmypop",
    "How many sides does a circle have?",
    "You can read btw",
    "Made you look!",
    "Redbull gives you wings...",
    "Since 2020!",
    "As seen on TV!",
    "guess what! vvmvvh",
    "Cold as ice!",
    "Made in the US!",
    "Made by Bubber!",
    "Reload the page NOW!",
    ];
    $('#quote').textContent = quotes[Math.floor(Math.random() * quotes.length)];

    renderCustom();
  </script>
</body>

</html>
