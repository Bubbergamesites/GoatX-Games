<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>New Tab</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --ikea-blue: #0051ba;
      --ikea-yellow: #ffda1a;
      --ikea-dark: #111111;
      --ikea-gray: #f5f5f5;
      --ikea-border: #dfdfdf;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--ikea-blue);
      color: #ffffff;
      font-family: "Noto Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Heavy, structural IKEA-style typography */
    .clock {
      font-size: 5.5rem;
      font-weight: 900;
      letter-spacing: -3px;
      margin-bottom: 2px;
      color: var(--ikea-yellow);
      line-height: 1;
    }

    .date {
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #ffffff;
      margin-bottom: 35px;
      opacity: 0.9;
    }

    /* Clean modern search input row */
    .search-box {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #ffffff;
      border-radius: 6px;
      padding: 6px 6px 6px 18px;
      width: 100%;
      max-width: 520px;
      margin-bottom: 45px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .search-box i {
      color: #666666;
      font-size: 15px;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--ikea-dark);
      font-size: 15px;
      font-family: inherit;
      font-weight: 500;
    }

    .search-box input::placeholder {
      color: #999999;
    }

    /* Clean structural dropdown */
    .search-box select {
      background: var(--ikea-gray);
      border: 1px solid var(--ikea-border);
      border-radius: 4px;
      color: var(--ikea-dark);
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      outline: none;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: background-color 0.15s;
    }

    .search-box select:hover {
      background: var(--ikea-border);
    }

    /* Grid mimicking modular storage shelves */
    .shortcuts {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      max-width: 520px;
      width: 100%;
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      cursor: pointer;
    }

    /* Sharp corners, modular look */
    .shortcut-icon {
      width: 64px;
      height: 64px;
      background: #ffffff;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    .shortcut:hover .shortcut-icon {
      transform: translateY(-3px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
    }

    .shortcut-icon img {
      width: 26px;
      height: 26px;
      /* Adjusted filter to make brand icons legible against clean white square panels */
      filter: grayscale(20%);
    }

    .shortcut-icon i {
      font-size: 22px;
      color: var(--ikea-blue);
    }

    .shortcut-label {
      font-size: 12px;
      font-weight: 700;
      color: #ffffff;
      text-align: center;
      max-width: 76px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.85;
    }

    .shortcut:hover .shortcut-label {
      opacity: 1;
      color: var(--ikea-yellow);
    }

    /* Status message ticker space */
    .quote {
      position: fixed;
      bottom: 24px;
      font-size: 13px;
      font-weight: 500;
      color: #ffffff;
      background-color: rgba(17, 17, 17, 0.25);
      padding: 8px 16px;
      border-radius: 4px;
      max-width: 500px;
      text-align: center;
      backdrop-filter: blur(4px);
    }

    /* Screen Full-Overlay System Loader */
    .loader {
      position: fixed;
      inset: 0;
      background: var(--ikea-dark);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .loader.show {
      display: flex;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--ikea-yellow);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Smooth responsiveness for narrow columns */
    @media (max-width: 540px) {
      .shortcuts {
        grid-template-columns: repeat(4, 1fr);
      }
      .clock { font-size: 4rem; }
    }
  </style>
</head>

<body>
  <div class="loader" id="loader">
    <div class="spinner"></div>
  </div>

  <div class="clock" id="clock">00:00</div>
  <div class="date" id="date"></div>

  <form class="search-box" id="searchForm">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="searchInput" placeholder="Search product catalogs or web..." autocomplete="off">
    <select id="engine">
      <option value="https://search.brave.com/search?q=">Brave</option>
      <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
      <option value="https://www.google.com/search?q=">Google</option>
    </select>
  </form>

  <div class="shortcuts" id="shortcuts">
    <a class="shortcut" data-url="https://youtube.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg" alt="YouTube"></div>
      <span class="shortcut-label">YouTube</span>
    </a>
    <a class="shortcut" data-url="https://github.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg" alt="GitHub"></div>
      <span class="shortcut-label">GitHub</span>
    </a>
    <a class="shortcut" data-url="https://discord.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg" alt="Discord"></div>
      <span class="shortcut-label">Discord</span>
    </a>
    <a class="shortcut" data-url="https://twitter.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg" alt="Twitter"></div>
      <span class="shortcut-label">Twitter</span>
    </a>
    <a class="shortcut" data-url="https://reddit.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/reddit.svg" alt="Reddit"></div>
      <span class="shortcut-label">Reddit</span>
    </a>
    <a class="shortcut" data-url="https://spotify.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/spotify.svg" alt="Spotify"></div>
      <span class="shortcut-label">Spotify</span>
    </a>
    <a class="shortcut" data-url="https://netflix.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/netflix.svg" alt="Netflix"></div>
      <span class="shortcut-label">Netflix</span>
    </a>
    <a class="shortcut" data-url="https://twitch.tv">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/twitch.svg" alt="Twitch"></div>
      <span class="shortcut-label">Twitch</span>
    </a>
    <a class="shortcut" data-url="https://mail.google.com">
      <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/gmail.svg" alt="Gmail"></div>
      <span class="shortcut-label">Gmail</span>
    </a>
    <div class="shortcut" id="addShortcut">
      <div class="shortcut-icon"><i class="fa-solid fa-plus"></i></div>
      <span class="shortcut-label">Add</span>
    </div>
  </div>

  <div class="quote" id="quote"></div>

  <script>
    const $ = s => document.querySelector(s);
    const nav = url => {
      $('#loader').classList.add('show');
      window.parent?.postMessage({ type: 'navigate', url }, '*');
    };

    // Clock Logic
    function updateClock() {
      const now = new Date();
      $('#clock').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
      $('#date').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Form Navigation
    $('#searchForm').onsubmit = e => {
      e.preventDefault();
      const q = $('#searchInput').value.trim();
      if (q) nav($('#engine').value + encodeURIComponent(q));
    };

    // Shortcut Click Operations
    $('#shortcuts').onclick = e => {
      const shortcut = e.target.closest('.shortcut[data-url]');
      const addBtn = e.target.closest('#addShortcut');

      if (shortcut) {
        e.preventDefault();
        nav(shortcut.dataset.url);
      } else if (addBtn) {
        const name = prompt("Shortcut name:");
        if (!name) return;
        let url = prompt("URL:");
        if (!url) return;
        if (!url.startsWith('http')) url = 'https://' + url;

        const shortcuts = JSON.parse(localStorage.getItem('shortcuts') || '[]');
        shortcuts.push({ name, url });
        localStorage.setItem('shortcuts', JSON.stringify(shortcuts));
        renderCustom();
      }
    };

    function renderCustom() {
      document.querySelectorAll('.custom-shortcut').forEach(e => e.remove());
      const shortcuts = JSON.parse(localStorage.getItem('shortcuts') || '[]');
      const addBtn = $('#addShortcut');

      shortcuts.forEach(s => {
        const div = document.createElement('div');
        div.className = 'shortcut custom-shortcut';
        div.dataset.url = s.url;
        div.innerHTML = `
          <div class="shortcut-icon"><i class="fa-solid fa-link"></i></div>
          <span class="shortcut-label">${s.name}</span>
        `;
        addBtn.before(div);
      });
    }

    // Interactive Floating Quotes
    const quotes = [
      "so tuff",
      "it is what it is",
      "do ur work",
      "this is what happens when u dont touch grass",
      "FULL BOX",
      "FULL PIECE",
      "200!",
      "press esc + refresh + power button for hacks",
      "press ctrl+x to hide your screen",
      "change the tab title and favicon in settings",
      "TEACHERR!",
      "lebron lebron lebronn james",
      "lebron is OUR goat"
    ];
    $('#quote').textContent = quotes[Math.floor(Math.random() * quotes.length)];

    renderCustom();
  </script>
</body>

</html>
