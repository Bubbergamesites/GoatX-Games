<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <title>AI Core | Mainframe Intercept</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --dark-green: #003b00;
            --terminal-bg: rgba(0, 5, 0, 0.9);
            --body-bg: #000000;
            --sidebar-bg: rgba(0, 15, 0, 0.95);
            --msg-ai-bg: rgba(0, 40, 0, 0.4);
            --msg-ai-text: #00ff41;
            --msg-user-bg: rgba(0, 255, 65, 0.15);
            --msg-user-text: #ffffff;
            --border-accent: #00ff41;
            --glow-effect: 0 0 10px rgba(0, 255, 65, 0.4);
            --panel-border: 1px solid #00ff41;
        }

        /* Matrix Alternating Shift: Amber Terminal Theme */
        [data-theme="dark"] {
            --matrix-green: #ffb000;
            --dark-green: #3b2800;
            --terminal-bg: rgba(10, 5, 0, 0.9);
            --sidebar-bg: rgba(20, 10, 0, 0.95);
            --msg-ai-bg: rgba(80, 40, 0, 0.3);
            --msg-ai-text: #ffb000;
            --msg-user-bg: rgba(255, 176, 0, 0.15);
            --border-accent: #ffb000;
            --glow-effect: 0 0 10px rgba(255, 176, 0, 0.4);
            --panel-border: 1px solid #ffb000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: var(--body-bg);
            color: var(--matrix-green);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s, color 0.3s;
            padding: 20px;
            overflow: hidden;
        }

        /* Live Matrix Rain Background */
        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        /* Core Terminal Panel Box */
        .wrapper {
            width: 100%;
            max-width: 1100px;
            height: calc(100vh - 40px);
            background: var(--terminal-bg);
            border-radius: 4px;
            box-shadow: var(--glow-effect), 0 10px 40px rgba(0, 0, 0, 0.8);
            display: flex;
            overflow: hidden;
            border: 2px solid var(--matrix-green);
            position: relative;
        }

        /* Sidebar Architecture: Terminal Session Menu */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 2px solid var(--matrix-green);
            display: flex;
            flex-direction: column;
            padding: 20px;
            flex-shrink: 0;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 1px dashed rgba(0, 255, 65, 0.3);
            padding-bottom: 10px;
        }
        [data-theme="dark"] .sidebar-header {
            border-bottom-color: rgba(255, 176, 0, 0.3);
        }

        .sidebar-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: var(--glow-effect);
        }

        /* Tactical Command Buttons */
        .action-btn {
            background: transparent;
            color: var(--matrix-green);
            border: 1px solid var(--matrix-green);
            padding: 12px 16px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            text-transform: uppercase;
            border-radius: 2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-bottom: 15px;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: var(--matrix-green);
            color: #000000;
            box-shadow: var(--glow-effect);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        /* Target Log Nodes */
        .history-item {
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            color: var(--matrix-green);
            border: 1px dashed rgba(0, 255, 65, 0.4);
            margin-bottom: 8px;
            border-radius: 2px;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.15s ease;
        }
        [data-theme="dark"] .history-item {
            border-color: rgba(255, 176, 0, 0.4);
        }

        .history-item:hover {
            background: rgba(0, 255, 65, 0.1);
            border-style: solid;
            border-color: var(--matrix-green);
            color: #ffffff;
        }
        [data-theme="dark"] .history-item:hover {
            background: rgba(255, 176, 0, 0.1);
            border-color: var(--matrix-green);
        }

        /* Matrix Theme Shift Controls */
        .bottom-controls {
            border-top: 1px solid rgba(0, 255, 65, 0.2);
            padding-top: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        [data-theme="dark"] .bottom-controls {
            border-top-color: rgba(255, 176, 0, 0.2);
        }

        .theme-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--matrix-green);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: var(--dark-green);
            transition: .2s;
            border-radius: 2px;
            border: 1px solid var(--matrix-green);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: var(--matrix-green);
            transition: .2s;
            border-radius: 2px;
        }

        input:checked+.slider {
            background-color: rgba(255, 255, 255, 0.1);
        }

        input:checked+.slider:before {
            transform: translateX(22px);
            background-color: var(--matrix-green);
        }

        /* Main AI Chat Interface Console */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: transparent;
        }

        .chat-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--matrix-green);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.4);
        }

        .chat-header h2 {
            font-size: 1.4rem;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: var(--glow-effect);
        }

        .home-link {
            font-size: 0.9rem;
            color: var(--matrix-green);
            text-decoration: none;
            text-transform: uppercase;
            border: 1px solid var(--matrix-green);
            padding: 6px 12px;
            border-radius: 2px;
            transition: all 0.2s ease;
        }

        .home-link:hover {
            background-color: var(--matrix-green);
            color: #000000;
            box-shadow: var(--glow-effect);
        }

        /* Message Output Monitor */
        .stage {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: transparent;
        }

        .msg {
            max-width: 80%;
            padding: 14px 18px;
            font-size: 1rem;
            line-height: 1.4;
            border-radius: 2px;
            word-wrap: break-word;
        }

        /* AI Operational Frame */
        .ai-msg {
            background-color: var(--msg-ai-bg);
            color: var(--msg-ai-text);
            align-self: flex-start;
            border: 1px solid var(--matrix-green);
            box-shadow: inset 0 0 8px rgba(0, 255, 65, 0.1);
        }

        /* User Core Input Bubbles */
        .user-msg {
            background-color: var(--msg-user-bg);
            color: var(--msg-user-text);
            align-self: flex-end;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-shadow: 0 0 4px rgba(255,255,255,0.3);
        }

        /* Shell Line Terminal Controls */
        .input-area {
            padding: 20px 25px;
            border-top: 1px solid var(--matrix-green);
            display: flex;
            gap: 12px;
            background: rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .input-wrapper {
            position: relative;
            flex: 1;
            display: flex;
        }

        .input-wrapper::before {
            content: "";
            position: absolute;
            left: 15px;
            top: 0;
            line-height: 50px;
            color: var(--matrix-green);
            font-size: 1rem;
        }

        .input-area input {
            width: 100%;
            padding: 14px 18px 14px 165px; /* Offset to bypass user line title */
            border: 1px solid var(--matrix-green);
            border-radius: 2px;
            font-size: 1rem;
            font-family: 'Share Tech Mono', monospace;
            background: rgba(0, 15, 0, 0.6);
            color: #ffffff;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-area input:focus {
            box-shadow: var(--glow-effect), inset 0 0 5px rgba(0, 255, 65, 0.2);
        }

        .send-btn {
            background: transparent;
            color: var(--matrix-green);
            border: 1px solid var(--matrix-green);
            width: 50px;
            border-radius: 2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.2s ease;
        }

        .send-btn:hover {
            background: var(--matrix-green);
            color: #000000;
            box-shadow: var(--glow-effect);
        }

        /* System Wipe Command link */
        .clear-btn {
            background: none;
            border: none;
            color: #ff3333;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: left;
            padding: 6px;
            width: max-content;
            margin-top: auto;
        }

        .clear-btn:hover {
            text-decoration: underline;
            text-shadow: 0 0 5px #ff3333;
        }

        @media (max-width: 768px) {
            body { padding: 0; }
            .wrapper { height: 100vh; border-radius: 0; border: none; }
            .sidebar { display: none; }
            .input-wrapper::before { content: ">"; left: 10px; }
            .input-area input { padding-left: 30px; }
        }
    </style>
</head>

<body>
    <canvas id="matrix-bg"></canvas>

    <div class="wrapper">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">LOGGED_SESSIONS</div>
            </div>

            <button class="action-btn" onclick="startNewChat()">
                <i class="ri-add-line"></i> [ + ] Initialize Node
            </button>

            <div class="history-list" id="history"></div>

            <button class="clear-btn" onclick="clearAllChats()">
                <i class="ri-delete-bin-line"></i> WIPE_DATABASE_LOGS
            </button>

            <div class="bottom-controls">
                <span class="theme-label">AMBER_SHIFT</span>
                <label class="switch">
                    <input type="checkbox" id="theme-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <h2>NEURAL_INTERFACE_CONSOLE</h2>
                <a href="/index.html" class="home-link">[ ESC ] DISCONNECT</a>
            </div>

            <div class="stage" id="stage">
                <div class="msg ai-msg">SECURE CONNECTION STABLE. Network Core operational. Input queries parameters...</div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="awaiting_instructional_payload..." autocomplete="off" />
                </div>
                <button class="send-btn" onclick="send()">
                    <i class="ri-send-plane-2-line"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        let currentThemeColor = '#00ff41';

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const matrixChars = "ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓ1234567890ABCDEF:*+-<>".split("");
        const fontSize = 14;
        let columns = canvas.width / fontSize;
        let dropPositions = Array(Math.floor(columns)).fill(1);

        function drawMatrixRain() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + 'px "Share Tech Mono", monospace';

            for (let i = 0; i < dropPositions.length; i++) {
                const char = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                const x = i * fontSize;
                const y = dropPositions[i] * fontSize;

                if(Math.random() > 0.98) {
                    ctx.fillStyle = '#ffffff';
                } else {
                    ctx.fillStyle = currentThemeColor;
                }

                ctx.fillText(char, x, y);

                if (y > canvas.height && Math.random() > 0.975) {
                    dropPositions[i] = 0;
                }
                dropPositions[i]++;
            }
        }
        let rainInterval = setInterval(drawMatrixRain, 33);
    </script>

    <script>
        const stage = document.getElementById('stage');
        const userInput = document.getElementById('user-input');
        const historyList = document.getElementById('history');

        let chats = JSON.parse(localStorage.getItem('0k3a_pro_vault')) || {};
        let chatId = Date.now();

        function updateHistory() {
            historyList.innerHTML = '';
            Object.keys(chats).sort((a, b) => b - a).forEach(id => {
                const div = document.createElement('div');
                div.className = 'history-item';
                const firstMsg = chats[id][0]?.content || "Empty Trace";
                div.textContent = "> " + firstMsg.substring(0, 22) + (firstMsg.length > 22 ? '...' : '');
                div.onclick = () => loadChat(id);
                historyList.appendChild(div);
            });
        }

        async function send() {
            const text = userInput.value.trim();
            if (!text) return;

            if (!chats[chatId]) chats[chatId] = [];
            chats[chatId].push({
                role: 'user',
                content: text
            });

            const uDiv = document.createElement('div');
            uDiv.className = 'msg user-msg';
            uDiv.textContent = text;
            stage.appendChild(uDiv);

            userInput.value = '';
            stage.scrollTop = stage.scrollHeight;

            const aiDiv = document.createElement('div');
            aiDiv.className = 'msg ai-msg';
            aiDiv.textContent = "PINGING_REMOTE_SERVER // EXECUTING_ENCRYPTED_HANDSHAKE...";
            stage.appendChild(aiDiv);
            stage.scrollTop = stage.scrollHeight;

            try {
                const response = await fetch('https://text.pollinations.ai/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messages: [{
                                role: 'system',
                                content: 'You are a highly advanced AI system core terminal intercept inside a matrix mainframe environment.'
                            },
                            {
                                role: 'user',
                                content: text
                            }
                        ],
                        model: 'openai'
                    })
                });

                if (!response.ok) throw new Error('DATA_LINK_ABORTED');

                const reply = await response.text();
                aiDiv.textContent = reply;

                chats[chatId].push({
                    role: 'ai',
                    content: reply
                });
                localStorage.setItem('0k3a_pro_vault', JSON.stringify(chats));

            } catch (error) {
                aiDiv.textContent = "SYS_ERR: Connection to remote node lost. Packet transmission terminated.";
                console.error(error);
            }

            stage.scrollTop = stage.scrollHeight;
            updateHistory();
        }

        function clearAllChats() {
            if (confirm("PURGE TOTAL SYSTEM HISTORY? WARNING: UNRECOVERABLE TRANSACTION.")) {
                chats = {};
                localStorage.removeItem('0k3a_pro_vault');
                updateHistory();
                startNewChat();
            }
        }

        function loadChat(id) {
            chatId = id;
            stage.innerHTML = '';
            chats[id].forEach(m => {
                const div = document.createElement('div');
                div.className = `msg ${m.role}-msg`;
                div.textContent = m.content;
                stage.appendChild(div);
            });
            stage.scrollTop = stage.scrollHeight;
        }

        function startNewChat() {
            chatId = Date.now();
            stage.innerHTML = '<div class=\"msg ai-msg\">NEW CHANNEL DECRYPTED. Core buffer purged. Awaiting telemetry...</div>';
            updateHistory();
        }

        userInput.onkeypress = (e) => {
            if (e.key === 'Enter') send();
        };

        // Custom Theme Intercept Pipeline
        const toggle = document.getElementById('theme-toggle');
        
        function applyColorSettings(isAmber) {
            if (isAmber) {
                document.documentElement.setAttribute('data-theme', 'dark');
                currentThemeColor = '#ffb000';
                localStorage.setItem('theme', 'dark');
                toggle.checked = true;
            } else {
                document.documentElement.removeAttribute('data-theme');
                currentThemeColor = '#00ff41';
                localStorage.setItem('theme', 'light');
                toggle.checked = false;
            }
        }

        toggle.onchange = () => {
            applyColorSettings(toggle.checked);
        };

        if (localStorage.getItem('theme') === 'dark') {
            applyColorSettings(true);
        } else {
            applyColorSettings(false);
        }

        updateHistory();
    </script>
</body>

</html>
