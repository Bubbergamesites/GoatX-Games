<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GoatX | Mainframe</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --matrix-green: #00ff41;
            --dark-green: #003b00;
            --terminal-bg: rgba(0, 5, 0, 0.85);
            --glow-effect: 0 0 10px rgba(0, 255, 65, 0.5), 0 0 20px rgba(0, 255, 65, 0.3);
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Share Tech Mono', monospace;
            background-color: #000;
            color: var(--matrix-green);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        .terminal-panel {
            background: var(--terminal-bg);
            border: 2px solid var(--matrix-green);
            padding: 40px;
            border-radius: 4px;
            text-align: center;
            box-shadow: var(--glow-effect), inset 0 0 15px rgba(0, 255, 65, 0.2);
            width: 85%;
            max-width: 600px;
            position: relative;
        }

        .terminal-panel::before {
            content: "SYS_STATUS: ONLINE // ACCESS_GRANTED";
            position: absolute;
            top: 5px;
            left: 10px;
            font-size: 0.75rem;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 5rem;
            font-weight: normal;
            margin: 20px 0 10px 0;
            color: #fff;
            text-shadow: 0 0 10px var(--matrix-green), 0 0 30px var(--matrix-green);
            letter-spacing: 4px;
        }

        .search-wrapper {
            position: relative;
            width: 90%;
            margin: 0 auto 40px auto;
        }

        .browse-btn {
            display: block;
            width: 100%;
            box-sizing: border-box;
            padding: 15px;
            border: 1px solid var(--matrix-green);
            background: rgba(0, 20, 0, 0.6);
            color: var(--matrix-green);
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            text-decoration: none;
            text-align: center;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            text-shadow: 0 0 5px var(--matrix-green);
            box-shadow: inset 0 0 5px rgba(0, 255, 65, 0.3);
        }

        .browse-btn:hover {
            background: rgba(0, 255, 65, 0.1);
            box-shadow: var(--glow-effect), inset 0 0 5px rgba(0, 255, 65, 0.5);
            color: #fff;
        }

        .nav-row {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--matrix-green);
            text-decoration: none;
            padding: 10px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            width: 90px;
        }

        .nav-item:hover {
            border: 1px solid var(--matrix-green);
            background: rgba(0, 255, 65, 0.1);
            box-shadow: var(--glow-effect);
            transform: translateY(-3px);
        }

        .icon-circle {
            font-size: 2rem;
            filter: drop-shadow(0 0 5px var(--matrix-green));
        }

        .icon-label {
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div class="terminal-panel">
        <h1>GoatX</h1>
        
        <div class="search-wrapper">
            <a href="./web/" class="browse-btn">browse_web</a>
        </div>

        <div class="nav-row">
            <a href="./projects" class="nav-item">
                <div class="icon-circle">🎮</div>
                <span class="icon-label">./games</span>
            </a>
            <a href="./apps" class="nav-item">
                <div class="icon-circle">📱</div>
                <span class="icon-label">./apps</span>
            </a>
            <a href="./chatbot" class="nav-item">
                <div class="icon-circle">🤖</div>
                <span class="icon-label">./ai_core</span>
            </a>
            <a href="./scramjet/#https://goatx-games.bubbertheclayblobofficial.workers.dev/movies" class="nav-item">
                <div class="icon-circle">🍿</div>
                <span class="icon-label">./media</span>
            </a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const matrixChars = "アカサタナハマヤラワガザダバパイウエオカキクケコスシスセソ1234567890".split("");
        const fontSize = 16;
        
        let columns = Math.floor(canvas.width / fontSize);
        let dropPositions = Array(columns).fill(1);

        window.addEventListener('resize', () => {
            columns = Math.floor(canvas.width / fontSize);
            if (dropPositions.length < columns) {
                const additional = Array(columns - dropPositions.length).fill(1);
                dropPositions = dropPositions.concat(additional);
            }
        });

        function drawMatrixRain() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00ff41';
            ctx.font = fontSize + 'px "Share Tech Mono", monospace';

            for (let i = 0; i < columns; i++) {
                const char = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                const x = i * fontSize;
                const y = dropPositions[i] * fontSize;

                if(Math.random() > 0.98) {
                    ctx.fillStyle = '#fff';
                } else {
                    ctx.fillStyle = '#00ff41';
                }

                ctx.fillText(char, x, y);

                if (y > canvas.height && Math.random() > 0.975) {
                    dropPositions[i] = 0;
                }
                dropPositions[i]++;
            }
        }
        setInterval(drawMatrixRain, 33);
    </script>
</body>
</html>
